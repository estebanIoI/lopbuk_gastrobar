# ============================================================
# docker-compose.db.yml — Solo la BD en Docker (modo dev liviano)
# ============================================================
#  Backend y frontend corren NATIVOS en Windows (`npm run dev`) → recarga
#  instantánea y mínimo consumo. Docker solo hospeda MySQL.
#
#  Uso:  docker compose -f docker-compose.db.yml up -d
#        docker compose -f docker-compose.db.yml down       (conserva datos)
#        docker compose -f docker-compose.db.yml down -v     (borra la BD)
#
#  Conexión para el backend nativo (backend/.env):
#    DB_HOST=127.0.0.1  DB_PORT=3307  DB_NAME=lopbuk  DB_USER=root  DB_PASSWORD=lopbuk_root_pw
# ============================================================

services:
  db:
    image: mysql:8.0
    container_name: lopbuk_db
    restart: unless-stopped
    # MySQL afinado para bajo consumo de RAM en laptop.
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=128M
      --performance-schema=OFF
      --innodb-flush-method=O_DIRECT
      --max-connections=50
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - lopbuk_db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  lopbuk_db_data:
    # Reusa el volumen ya migrado del stack anterior (201 tablas) si existe.
    name: lopbuk_stack_db_data
